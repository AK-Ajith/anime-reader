<section class="loading-state" *ngIf="loading()">
  <mat-spinner diameter="48"></mat-spinner>
  <p>Opening reader...</p>
</section>

<section class="reader-page" *ngIf="!loading() && manga() as selectedManga">
  <div class="reader-toolbar">
    <div class="reader-headline">
      <a mat-button [routerLink]="['/manga', selectedManga.id]">
        <mat-icon>arrow_back</mat-icon>
        Back to Details
      </a>
      <h1>{{ selectedManga.title }}</h1>
      <p>Page {{ currentPage() + 1 }} of {{ selectedManga.pages.length }}</p>
    </div>
    <div class="reader-actions">
      <button mat-stroked-button type="button" (click)="goToPrevious()" [disabled]="currentPage() === 0">
        Previous
      </button>
      <button
        mat-flat-button
        type="button"
        (click)="goToNext()"
        [disabled]="currentPage() === selectedManga.pages.length - 1"
      >
        Next Page
      </button>
    </div>
  </div>

  <div class="progress-shell">
    <span>Reading progress</span>
    <mat-progress-bar mode="determinate" [value]="progressPercent()"></mat-progress-bar>
  </div>

  <div class="reader-canvas">
    <img [src]="currentImage()" [alt]="selectedManga.title + ' page ' + (currentPage() + 1)" />
  </div>
</section>

<section class="empty-state" *ngIf="!loading() && !manga()">
  <mat-icon>menu_book</mat-icon>
  <h2>Reader unavailable</h2>
  <a mat-flat-button routerLink="/home">Return Home</a>
</section>
