<div class="shell">
  <mat-toolbar class="topbar">
    <div class="brand-cluster">
      <a class="brand" routerLink="/home">
        <span class="brand-mark">M</span>
        <span>
          <strong>Manga Reader</strong>
          <small>Library</small>
        </span>
      </a>

      <nav class="nav-links">
        <a mat-button routerLink="/home" routerLinkActive="active-link">Home</a>
        <a mat-button routerLink="/saved" routerLinkActive="active-link">Saved</a>
      </nav>
    </div>

    <div class="toolbar-spacer"></div>

    <div class="user-block" *ngIf="authService.currentUser() as user">
      <div class="user-copy">
        <span>{{ user.displayName }}</span>
        <small>Signed in</small>
      </div>
      <button mat-stroked-button type="button" (click)="authService.logout()">
        <mat-icon>logout</mat-icon>
        Logout
      </button>
    </div>
  </mat-toolbar>

  <main class="shell-content">
    <router-outlet />
  </main>
</div>
