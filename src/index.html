<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Manga Reader</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script>
    (function () {
      var redirect = sessionStorage.getItem('gh-pages-spa-redirect');
      if (!redirect) {
        return;
      }

      sessionStorage.removeItem('gh-pages-spa-redirect');
      var redirectUrl = new URL(redirect, window.location.origin);
      var currentUrl = new URL(window.location.href);
      var restoredPath = redirectUrl.pathname + redirectUrl.search + redirectUrl.hash;
      var currentPath = currentUrl.pathname + currentUrl.search + currentUrl.hash;

      if (restoredPath !== currentPath) {
        window.history.replaceState(null, '', restoredPath);
      }
    })();
  </script>
  <script src="app-config.js"></script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
