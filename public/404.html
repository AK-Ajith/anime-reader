<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Manga Reader</title>
  <script>
    (function () {
      var pathSegmentsToKeep = 1;
      var location = window.location;
      var origin = location.protocol + '//' + location.hostname + (location.port ? ':' + location.port : '');
      var pathSegments = location.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/');
      var redirectUrl = origin + pathSegments + '/';
      var restoredRoute = location.pathname.slice(pathSegments.length) + location.search + location.hash;

      sessionStorage.setItem('gh-pages-spa-redirect', restoredRoute || '/');
      location.replace(redirectUrl);
    })();
  </script>
</head>
<body></body>
</html>
